name: Android CI (SpeedCool App)

on:
  workflow_dispatch:
  push:
    branches:
      - app
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/android-app.yml'
  pull_request:
    branches:
      - app

concurrency:
  group: speedcool-app-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Build & Check Debug
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle  # cache Gradle aqui ajuda, mas setup-gradle cuida do resto

      - name: Setup Gradle (cache + wrapper validation automática)
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Android SDK extras (opcional)
        uses: actions/cache@v4
        with:
          path: \~/.android
          key: \( {{ runner.os }}-android-sdk- \){{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-android-sdk-

      - name: Run lint & unit tests
        run: ./gradlew lintDebug testDebugUnitTest --stacktrace --info

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --info

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SpeedCoolApp-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7

  build-release-unsigned:
    name: Build Release (unsigned)
    runs-on: ubuntu-latest
    # needs: build-debug  # Comente para builds paralelos se quiser mais velocidade
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Gradle (cache + wrapper validation automática)
        uses: gradle/actions/setup-gradle@v5

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Android SDK extras
        uses: actions/cache@v4
        with:
          path: \~/.android
          key: \( {{ runner.os }}-android-sdk- \){{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-android-sdk-

      - name: Build Release APK (unsigned)
        run: ./gradlew :app:assembleRelease --stacktrace --info

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: SpeedCoolApp-Release-Unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 7