name: Android CI (SpeedCool App)

on: workflow_dispatch: push: branches: - app paths: - "app/" - "gradle/" - "gradlew" - "gradlew.bat" - "build.gradle.kts" - "settings.gradle.kts" - "gradle.properties" - ".github/workflows/android-app.yml" pull_request: branches: - app

concurrency: group: speedcool-app-${{ github.ref }} cancel-in-progress: true

jobs: build-debug: name: Build Debug APK runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up JDK 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "21"
      cache: gradle

  - name: Make Gradle wrapper executable
    run: chmod +x ./gradlew

  - name: Validate Gradle wrapper
    uses: gradle/actions/wrapper-validation@v3

  - name: Build Debug APK
    run: ./gradlew :app:assembleDebug

  - name: Upload Debug APK
    uses: actions/upload-artifact@v4
    with:
      name: SpeedCoolApp-Debug
      path: app/build/outputs/apk/debug/app-debug.apk
      if-no-files-found: error

build-release-unsigned: name: Build Release APK (unsigned) runs-on: ubuntu-latest needs: build-debug

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set up JDK 21
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "21"
      cache: gradle

  - name: Make Gradle wrapper executable
    run: chmod +x ./gradlew

  - name: Validate Gradle wrapper
    uses: gradle/actions/wrapper-validation@v3

  - name: Build Release APK
    run: ./gradlew :app:assembleRelease

  - name: Upload Release APK (unsigned)
    uses: actions/upload-artifact@v4
    with:
      name: SpeedCoolApp-Release-Unsigned
      path: app/build/outputs/apk/release/app-release.apk
      if-no-files-found: error